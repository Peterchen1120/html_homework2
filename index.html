<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>CSS Image Styling Practice</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            width: 90%;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* Left Image: 33% width, 18px radius, no distortion */
        .img-left {
            width: 33%;
            height: 300px; /* Fixed height to match the right side */
            border-radius: 18px;
            object-fit: cover; /* This prevents the distortion */
        }

        /* Center Image: 150px circle, no distortion */
        .img-center {
            width: 150px;
            height: 150px;
            border-radius: 50%; /* Makes it a circle */
            border: 1px solid #000; /* As indicated by the 'border' note */
            object-fit: cover; /* This prevents the distortion */
        }

        /* Right Image: 33% width, 300px height, distorted */
        .img-right {
            width: 33%;
            height: 300px;
            /* By NOT using object-fit, the image will stretch to fill these dimensions */
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="https://picsum.photos/450/240?random=10" class="img-left" alt="Eiffel Tower">

        <img src="https://picsum.photos/450/240?random=9" class="img-center" alt="Landscape">

        <img src="https://picsum.photos/450/240?random=10" class="img-right" alt="Eiffel Tower Distorted">
    </div>

</body>
</html>

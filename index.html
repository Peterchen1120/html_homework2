<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>CSS Image Styling Practice</title>
    <style>
       .container {
    width: 100%;
    display: flex;
    justify-content: center; /* 置中 */
    align-items: center;    /* 垂直置中 */
    gap: 0;                 /* 關鍵 1：先把間距歸零，讓大家貼在一起 */
}

/* 左圖 */
.img-left {
    width: 33%;
    height: 300px;
    border-radius: 18px;
    object-fit: cover;
    /* 這裡不用動 */
}

/* 中間圓圖 */
.img-center {
    width: 150px;
    height: 150px;
    border-radius: 50%;
    border: 1px solid #000;
    object-fit: cover;
    
    /* 關鍵 2：移除之前的負邊距，改為 0 或小正數 */
    margin-left: 0; 
    margin-right: 0;
    
    /* 如果你覺得貼太死，可以加一點點間距，例如 2px */
    /* margin: 0 2px; */
}

/* 右圖 */
.img-right {
    width: 33%;
    height: 300px;
}
    </style>
</head>
<body>

    <div class="container">
        <img src="https://picsum.photos/450/240?random=10" class="img-left" alt="Eiffel Tower">

        <img src="https://picsum.photos/450/240?random=9" class="img-center" alt="Landscape">

        <img src="https://picsum.photos/450/240?random=10" class="img-right" alt="Eiffel Tower Distorted">
    </div>

</body>
</html>

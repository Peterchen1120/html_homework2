<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>CSS Image Styling Practice</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
       .container {
            width: 100%;
            display: flex;
            justify-content: center; 
            /* 關鍵修正：從 center 改成 flex-start，讓所有圖片頂端對齊 */
            align-items: flex-start;    
            gap: 0;
        }

        /* 中間圓圖 */
        .img-center {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 1px solid #000;
            object-fit: cover;
            
            /* 確保 margin 歸零，它就會自然貼齊上方邊界 */
            margin: 0; 
        }

        /* 左圖 */
        .img-left {
            width: 33%;
            height: 300px;
            border-radius: 18px;
            object-fit: cover;
            /* 這裡不用動 */
        }

        /* 右圖 */
        .img-right {
            width: 33%;
            height: 300px;
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="https://picsum.photos/450/240?random=10" class="img-left" alt="Eiffel Tower">

        <img src="https://picsum.photos/450/240?random=9" class="img-center" alt="Landscape">

        <img src="https://picsum.photos/450/240?random=10" class="img-right" alt="Eiffel Tower Distorted">
    </div>

</body>
</html>
